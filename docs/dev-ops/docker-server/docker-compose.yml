services:
  mysql:
    image: mysql:8.0.36
    container_name: easy-agent-mysql
    restart: unless-stopped
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      TZ: ${TZ}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../mysql/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ../../..
      dockerfile: Dockerfile
    image: easy-agent/backend:${APP_IMAGE_TAG}
    container_name: easy-agent-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      TZ: ${TZ}
      SERVER_PORT: 8091
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useUnicode=true&characterEncoding=utf8&autoReconnect=true&zeroDateTimeBehavior=convertToNull&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      JAVA_OPTS: ${BACKEND_JAVA_OPTS}
    ports:
      - "${BACKEND_PORT}:8091"
    volumes:
      - backend_log:/app/data/log

  frontend:
    build:
      context: ../../../../easy-agent-front
      dockerfile: Dockerfile
    image: easy-agent/frontend:${APP_IMAGE_TAG}
    container_name: easy-agent-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      TZ: ${TZ}
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_BASE_URL: ${PUBLIC_BASE_URL}
    expose:
      - "3000"

  gateway:
    image: nginx:1.27-alpine
    container_name: easy-agent-gateway
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "${GATEWAY_PORT}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mysql_data:
  backend_log:
