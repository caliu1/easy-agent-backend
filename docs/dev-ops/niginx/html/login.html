<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能体平台 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            background-color: #f3f4f6;
        }

        /* 左侧展示区 */
        .left-panel {
            flex: 1;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        /* 背景动画效果 */
        .left-panel::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 60%);
            top: -50%;
            left: -50%;
            animation: pulse 8s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        .info-content {
            z-index: 1;
            text-align: center;
            max-width: 500px;
        }

        .info-content h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .info-content p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 40px;
            color: #e0e7ff;
        }

        /* AI 效果图 */
        .ai-image {
            width: 100%;
            max-width: 420px;
            height: 320px;
            /* 使用了一张具有科技感/AI感的占位图 */
            background: url('https://images.unsplash.com/photo-1677442136019-21780ecad995?q=80&w=1000&auto=format&fit=crop') center/cover no-repeat;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            z-index: 1;
            border: 2px solid rgba(255,255,255,0.1);
            transition: transform 0.3s ease;
        }

        .ai-image:hover {
            transform: translateY(-10px);
        }

        /* 右侧登录区 */
        .right-panel {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }

        .login-container h2 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            color: #1f2937;
        }

        .login-container p {
            color: #6b7280;
            margin-bottom: 30px;
            font-size: 1rem;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            background-color: #f9fafb;
        }

        .input-group input:focus {
            border-color: #2a5298;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(42, 82, 152, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background-color: #2a5298;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
            margin-top: 15px;
            box-shadow: 0 4px 6px rgba(42, 82, 152, 0.2);
        }

        .login-btn:hover {
            background-color: #1e3c72;
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .error-message {
            color: #ef4444;
            font-size: 0.9rem;
            margin-top: 10px;
            display: none;
            background-color: #fef2f2;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #fca5a5;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .left-panel {
                padding: 30px 20px;
                flex: none;
                height: 40vh;
            }
            .info-content h1 {
                font-size: 2rem;
            }
            .info-content p {
                font-size: 1rem;
                margin-bottom: 20px;
            }
            .ai-image {
                height: 150px;
                max-width: 250px;
            }
            .right-panel {
                height: 60vh;
                align-items: flex-start;
                padding-top: 20px;
            }
            .login-container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <!-- 左侧展示区 -->
    <div class="left-panel">
        <div class="info-content">
            <h1>AI 智能体平台</h1>
            <p>探索未来的工作方式。我们的智能体将协助您完成复杂的任务，提高效率，激发无限创造力。</p>
            <!-- AI 效果图展示 -->
            <div class="ai-image" title="AI 概念图"></div>
        </div>
    </div>

    <!-- 右侧登录区 -->
    <div class="right-panel">
        <div class="login-container">
            <h2>欢迎登录</h2>
            <p>请输入您的账号和密码进入智能体工作台</p>

            <form id="loginForm">
                <div class="input-group">
                    <label for="username">账号</label>
                    <input type="text" id="username" placeholder="请输入账号" value="admin" required>
                </div>
                
                <div class="input-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" placeholder="请输入密码" value="admin" required>
                </div>

                <div class="error-message" id="errorMessage">账号或密码错误，请重试！</div>

                <button type="submit" class="login-btn">登 录</button>
            </form>
        </div>
    </div>

    <script>
        // 设置 Cookie 的通用函数
        function setCookie(name, value, days) {
            let expires = "";
            if (days) {
                const date = new Date();
                date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
                expires = "; expires=" + date.toUTCString();
            }
            document.cookie = name + "=" + (value || "")  + expires + "; path=/";
        }

        // 监听表单提交事件
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); // 阻止表单的默认提交刷新行为
            
            const usernameInput = document.getElementById('username').value;
            const passwordInput = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMessage');

            // 验证默认账号密码: admin / admin
            if (usernameInput === 'admin' && passwordInput === 'admin') {
                // 隐藏错误信息
                errorMsg.style.display = 'none';
                
                // 登录成功，保存相关 Cookie (有效期 7 天)
                setCookie('isLoggedIn', 'true', 7);
                setCookie('username', usernameInput, 7);
                setCookie('token', 'ai_agent_auth_token_example', 7);
                
                // 打印到控制台以供验证
                console.log('当前保存的 Cookie:', document.cookie);
                
                // 重定向到系统主页
                window.location.href = 'index.html';
            } else {
                // 验证失败，显示错误信息
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
