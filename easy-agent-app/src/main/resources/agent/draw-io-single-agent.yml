ai:
  agent:
    config:
      tables:
        drawioSingleAgent:
          app-name: DrawIoSingleAgentApp
          agent:
            agent-id: "100121"
            agent-name: DrawIO Single Agent
            agent-desc: 单智能体，按用户意图在普通对话与 draw.io XML 生成之间切换
          module:
#            ai-api:
#              base-url: https://dashscope.aliyuncs.com/compatible-mode/
#              api-key: ${DASHSCOPE_API_KEY}
#              completions-path: v1/chat/completions
#              embeddings-path: v1/embeddings
#            chat-model:
#              model: qwen-plus
            ai-api:
              base-url: https://api.deepseek.com
              api-key: ${DEEPSEEK_API_KEY}
              completions-path: v1/chat/completions
              embeddings-path: v1/embeddings
            chat-model:
              model: deepseek-chat
              tool-mcp-list:
                - streamable-http:
                    name: web-search-mcp-server
                    base-uri: https://qianfan.baidubce.com/v2/tools/web-search/mcp
                    headers:
                      Authorization: Bearer ${BAIDU_API_KEY}
                    request-timeout: 10000
              tool-skills-list:
                - type: resource
                  path: agent/skills/drawio-skill

            agents:
              - name: DrawioSingleAgent
                description: 根据意图执行普通对话或生成可导入 draw.io 的 XML
                instruction: |
                  你是 DrawioSingleAgent。你只有两个模式：
                  1) 普通对话模式：用户未要求绘图时，正常回答。
                  2) 绘图模式：用户要求流程图/架构图/UML/时序图/生成 draw.io XML 时，生成标准 XML。

                  【意图判断】
                  - 闲聊、问答、感谢、确认、解释类请求：走普通对话模式。
                  - 明确要求“画图/流程图/架构图/UML/时序图/draw.io XML”：走绘图模式。

                  【信息不足处理】
                  - 若绘图信息不足，最多追问 1~3 个关键问题（图类型、关键步骤、分支、风格/布局）。
                  - 若用户明确“按默认继续/你来补全”，可用通用假设继续。
                  - 在信息不足时，禁止输出半成品 XML 或片段 XML。

                  【绘图模式硬规则】
                  - 流程图中的判断节点必须为菱形（decision/rhombus）。
                  - 判断分支必须标注 Yes/No（或 Pass/Fail）。
                  - 连线必须正交（横平竖直），禁止斜线。
                  - 锚点只能在边上（top/right/bottom/left），禁止连接到中心点。
                  - 连线接入节点边界时，首段/末段方向要与该边垂直。
                  - 连线不得穿过无关节点主体，非端点与节点保持可读净距（建议 >= 20px）。
                  - 输入/输出尽量使用总线；冲突时可局部绕行。

                  【最终输出协议（最高优先级）】
                  - 仅当绘图模式且已可交付时，最终输出必须是一个完整 XML 文本。
                  - 最终输出必须以 <mxfile 开头，以 </mxfile> 结尾。
                  - 最终输出中必须包含：mxfile、diagram、mxGraphModel、root、mxCell。
                  - 禁止输出 markdown（例如 ```xml）、禁止输出“Here is...”、禁止 JSON 包装、禁止解释文字。
                  - 禁止输出残片（例如只输出 style 片段、坐标片段、entryX/entryY 片段）。

            runner:
              agent-name: DrawioSingleAgent
              plugin-name-list:
                - myTestPlugin
                - myLogPlugin
