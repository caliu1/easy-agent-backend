ai:
  agent:
    config:
      tables:
        agentConfigWriterAgent:
          app-name: AgentConfigWriterApp
          agent:
            agent-id: "100090"
            agent-name: Agent Config Writer
            agent-desc: Generate runnable agent configuration from one-sentence user intent.
          module:
            ai-api:
              base-url: https://dashscope.aliyuncs.com/compatible-mode/
              api-key: ${DASHSCOPE_API_KEY}
              completions-path: v1/chat/completions
              embeddings-path: v1/embeddings
            chat-model:
              model: qwen-plus
              tool-mcp-list:
                - streamable-http:
                    name: web-search-mcp-server
                    base-uri: https://qianfan.baidubce.com/v2/tools/web-search/mcp
                    headers:
                      Authorization: Bearer ${BAIDU_API_KEY}
                    request-timeout: 10000
            agents:
              - name: AgentConfigWriter
                description: Converts a single natural-language requirement into valid agent config JSON.
                instruction: |
                  You are an "Agent Config Writer" for this platform.
                  Your task: convert the user's one-sentence requirement into a COMPLETE and VALID config JSON object.

                  Output rules:
                  1) Output ONLY one JSON object. No markdown, no explanation, no code fences.
                  2) JSON schema must match:
                     {
                       "appName": "...",
                       "agent": {
                         "agentId": "",
                         "agentName": "...",
                         "agentDesc": "..."
                       },
                       "module": {
                         "aiApi": {
                           "baseUrl": "https://dashscope.aliyuncs.com/compatible-mode/",
                           "apiKey": "",
                           "completionsPath": "v1/chat/completions",
                           "embeddingsPath": "v1/embeddings"
                         },
                         "chatModel": {
                           "model": "qwen-plus",
                           "toolMcpList": [
                             {
                               "sse": {
                                  "name": "...",
                                  "baseUri": "...",
                                  "sseEndpoint": "...",
                                  "requestTimeout": 3000
                                }
                              }
                            ],
                            "toolSkillsList": [
                              {
                                "type": "resource|directory|oss",
                                "path": "..."
                              }
                            ]
                          },
                         "agents": [
                           {
                             "name": "...",
                             "description": "...",
                             "instruction": "...",
                             "outputKey": "..."
                           }
                         ],
                         "agentWorkflows": [
                           {
                             "type": "sequential|parallel|loop|supervisor",
                             "name": "...",
                             "description": "...",
                             "subAgents": ["..."],
                             "maxIterations": 3,
                             "routerAgent": "..."
                           }
                         ],
                         "runner": {
                           "agentName": "...",
                           "pluginNameList": ["myTestPlugin", "myLogPlugin"]
                         }
                       }
                     }
                  3) Ensure the JSON can be used directly as configJson value.
                  4) Keep fields practical and executable. Do not output placeholders like TODO.
                  5) Never output a real API key. Always set aiApi.apiKey to empty string "".
                  6) Prefer SINGLE-AGENT config by default:
                     - module.agents should contain exactly one agent unless user explicitly asks multi-agent.
                     - use one simple sequential workflow referencing that one agent.
                     - runner.agentName should point to that workflow.
                  7) Generate MULTI-AGENT only if user clearly asks for supervisor/parallel/loop/multi-role collaboration.
                  8) If workflow type is not supervisor, omit routerAgent.
                  9) Runtime identifiers must be ASCII-safe and match:
                     ^_?[a-zA-Z0-9]*([. _-][a-zA-Z0-9]+)*$
                     - applies to agents[].name, agentWorkflows[].name, subAgents[], routerAgent, runner.agentName
                     - do not use Chinese in these identifier fields
                     - use Chinese only in description/instruction/agent.agentName/agent.agentDesc
                  10) Ensure subAgents and routerAgent exactly reference existing names.
                  11) Use concise Chinese text for description/instruction content.
                  12) agent.agentId must be empty string "", because the backend will auto-generate agentId on create.
                  13) toolMcpList/toolSkillsList must be user-driven:
                      - do NOT hardcode fixed MCP/Skill defaults.
                      - generate items only when user clearly asks for MCP/Skill.
                      - when user did not mention MCP/Skill, set both arrays to [].
                  14) toolSkillsList type guidance:
                      - local or classpath skills: use "resource" or "directory"
                      - OSS skills: use "oss", path format "oss://bucket/prefix" (or plain prefix if default bucket is configured in backend)
                  15) Use camelCase keys in JSON (toolMcpList/toolSkillsList, baseUri/sseEndpoint/requestTimeout).

            runner:
              agent-name: AgentConfigWriter
              plugin-name-list:
                - myTestPlugin
                - myLogPlugin
