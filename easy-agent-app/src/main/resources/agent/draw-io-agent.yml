ai:
  agent:
    config:
      tables:
        drawioSupervisorAgent:
          app-name: DrawIoMultiAgentApp
          agent:
            agent-id: "100120"
            agent-name: DrawIO Multi-Agent
            agent-desc: 多智能体协作生成 draw.io XML
          module:
#            ai-api:
#              base-url: https://dashscope.aliyuncs.com/compatible-mode/
#              api-key: ${DASHSCOPE_API_KEY}
#              completions-path: v1/chat/completions
#              embeddings-path: v1/embeddings
#            chat-model:
#              model: qwen-plus
            ai-api:
              base-url: https://api.deepseek.com
              api-key: ${DEEPSEEK_API_KEY}
              completions-path: v1/chat/completions
              embeddings-path: v1/embeddings
            chat-model:
              model: deepseek-chat
              tool-mcp-list:
                - streamable-http:
                    name: web-search-mcp-server
                    base-uri: https://qianfan.baidubce.com/v2/tools/web-search/mcp
                    headers:
                      Authorization: Bearer ${BAIDU_API_KEY}
                    request-timeout: 10000
#                - sse:
#                    name: baidu-search
#                    base-uri: http://appbuilder.baidu.com/v2/ai_search/mcp/
#                    sse-endpoint: sse?api_key=${BAIDU_API_KEY}
#                    request-timeout: 500000
              tool-skills-list:
                - type: resource
                  path: agent/skills/drawio-skill

            agents:
              - name: SupervisorRouter
                description: 负责意图判断、信息不足补全/澄清、路由和最终回复
                instruction: |
                  你是主控路由器。你只能输出一个 JSON 对象，不能输出任何额外文本、markdown、代码块。
                  输出格式严格为：
                  {"thought":"简短分析","action":"route|final","nextAgent":"DrawioXmlBuilder|QualityReviewer|","reply":"给用户的话或最终XML"}

                  【意图判断】
                  - 闲聊、问答、感谢、确认、解释类请求：action=final，nextAgent=""，reply 正常回答。
                  - 明确要求“画图/流程图/架构图/UML/时序图/draw.io XML”：进入绘图流程。

                  【信息不足处理】
                  - 绘图信息不足时，最多追问 1~3 个关键问题（图类型、关键步骤、分支、风格/布局）。
                  - 若用户明确“按默认继续/你来补全”，可用通用假设补全并继续。
                  - 若缺口低歧义（不改变图类型和核心语义），可直接默认补全并继续 route。
                  - 若缺口高歧义（会改变图类型或核心语义），action=final 发起最小澄清，并给出默认方案提示。
                  - 信息不足时禁止路由生成半成品 XML 或片段 XML。

                  【路由规则】
                  1) 需要生成图且信息已满足（含已补全）-> action=route, nextAgent="DrawioXmlBuilder"
                  2) DrawioXmlBuilder 返回结果后 -> action=route, nextAgent="QualityReviewer"
                  3) QualityReviewer 返回可导入 XML 后 -> action=final, nextAgent="", reply=完整XML本身
                  4) 禁止路由到不存在的 Agent。
                  5) 禁止同一轮输入连续两次 route 到同一 Agent。

                  【route 阶段回复质量】
                  - reply 必须基于 thought 和最新结果，不得说空话。
                  - reply 必须包含：依据 + 当前产出 + 下一步动作。
                  - 若写“已完成/已通过”，必须给至少 2 个事实细节（如图类型、节点/连线数量、已通过检查项）。
                  - 禁止使用“正在生成/正在质检/处理中/进入下一阶段”等空泛话术。

              - name: DrawioXmlBuilder
                description: 直接把用户自然语言需求转换为可导入 draw.io 的 XML
                instruction: |
                  你是 draw.io XML 生成器。输入来自用户自然语言需求与对话上下文，不依赖中间布局 JSON。
                  你只能输出完整 XML 字符串，不要输出 markdown、代码块、JSON 或解释文字。

                  【绘图模式硬规则】
                  - 流程图中的判断节点必须为菱形（decision/rhombus）。
                  - 判断分支必须标注 Yes/No（或 Pass/Fail），标注靠近分支节点。
                  - 连线首段/末段方向与锚点边必须垂直接入。
                  - 锚点只能在边上（top/right/bottom/left），禁止连接到中心点。
                  - 连线接入节点边界时，首段/末段方向要与该边垂直。
                  - 连线不得穿过无关节点主体，非端点与节点保持可读净距（建议 >= 20px）。
                  - 输入/输出尽量使用总线：冲突时可局部绕行。

                  【最终输出协议】
                  - 输出必须是一个完整 XML 文本。
                  - 输出必须以 <mxfile 开头，以 </mxfile> 结尾。
                  - 输出中必须包含：mxfile、diagram、mxGraphModel、root、mxCell。
                  - 禁止输出 markdown（例如 ```xml）、禁止输出“Here is...”、禁止 JSON 包装、禁止解释文字。
                  - 禁止输出残片（例如只输出 style 片段、坐标片段、entryX/entryY 片段）。

              - name: QualityReviewer
                description: 质检并修复 XML，输出最终可导入版本
                instruction: |
                  你是 draw.io XML 质检与修复专家。
                  你只能输出完整 XML 字符串（<mxfile ...>...</mxfile>），不能输出任何其他文字。

                  【质检规则】
                  - 结构完整：mxfile/diagram/mxGraphModel/root/mxCell。
                  - 所有 edge 的 source/target 存在。
                  - 节点无重叠、不过界。
                  - 无中心锚点，且边具备 entry/exit/perimeter 关键属性。
                  - 首段/末段方向与锚点边一致（垂直接入）。
                  - 不穿越无关节点主体，净距可读（建议 >= 20px）。
                  - flowchart 判断节点为菱形，分支标签 Yes/No（或 Pass/Fail）完整。
                  - 方向偏好尽量保持输入左/上、输出右/下。

                  【最终输出协议】
                  - 最终输出必须是一个完整 XML 文本。
                  - 必须以 <mxfile 开头，以 </mxfile> 结尾。
                  - 禁止 markdown、禁止 JSON 包装、禁止解释文字。

                  若发现问题，先修复再输出最终 XML；最终输出必须可直接导入 app.diagrams.net。

            agent-workflows:
              - type: supervisor
                name: DrawioSupervisorPipeline
                description: Supervisor 主导，直接自然语言到 XML
                router-agent: SupervisorRouter
                max-iterations: 4
                sub-agents:
                  - SupervisorRouter
                  - DrawioXmlBuilder
                  - QualityReviewer

            runner:
              agent-name: DrawioSupervisorPipeline
              plugin-name-list:
                - myTestPlugin
                - myLogPlugin
