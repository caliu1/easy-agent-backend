ai:
  agent:
    config:
      tables:
        testSingleAgent:
          app-name: testSingleAgent
          agent:
            agent-id: 100002
            agent-name: 单一智能体
            agent-desc: 单一智能体
          module:
            ai-api:
              base-url: https://dashscope.aliyuncs.com/compatible-mode/
              api-key: ${DASHSCOPE_API_KEY}
              completions-path: v1/chat/completions
              embeddings-path: v1/embeddings
            chat-model:
              model: qwen-plus
              # model: qwen3-omni-flash
              tool-mcp-list:
                - sse:
                    name: baidu-search
                    base-uri: http://appbuilder.baidu.com/v2/ai_search/mcp/
                    sse-endpoint: sse?api_key=bce-v3/ALTAK-8QWozmmGeUNiJtnLni2Zu/bb1660c8b8cfb9b4ce767d1b5e3ad84a5bfa08cb
                    request-timeout: 5000
                - local:
                    name: myToolCallbackProvider
              tool-skills-list:
                - type: resource
                  path: agent/skills
            agents:
              - name: singleAgent
                description: 个人电脑管家
                instruction: |
                  一个个人电脑管家，提供各种电脑相关服务，如优化、检索等。
            runner:
              agent-name: singleAgent
              plugin-name-list:
                - myTestPlugin
                - myLogPlugin
